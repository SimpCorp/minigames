<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DotPixel</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #0f1117;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 28px 64px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo span {
            color: #5da9ff;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .hero {
            max-width: 700px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.15;
        }

        .hero p {
            font-size: 1.05rem;
            color: #b5b8c5;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .status {
            display: inline-block;
            padding: 12px 22px;
            border: 1px solid rgba(93,169,255,0.25);
            border-radius: 8px;
            background: rgba(93,169,255,0.08);
            color: #9bc7ff;
            font-size: 0.95rem;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            color: #7d818f;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            header {
                padding: 24px;
            }

            .hero h1 {
                font-size: 2.3rem;
            }

            .hero p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Dot<span>Pixel</span></div>
    </header>

    <main>
        <section class="hero">
            <h1>Mini Games.<br>Coming Soon.</h1>

            <p>
                DotPixel is currently under development.
                We're building a dedicated destination for polished,
                browser-based mini games. Check back soon for updates.
            </p>

            <div class="status">
                Site Under Construction
            </div>
        </section>
    </main>

    <footer>
        © 2026 DotPixel. All rights reserved.
    </footer>

</body>
</html>
