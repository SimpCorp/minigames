<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DotPixel</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#0f1117;color:#f5f5f5;overflow:hidden}header{padding:28px 64px;border-bottom:1px solid rgba(255,255,255,.08)}.logo{font-size:1.9rem;font-weight:700}.logo span{color:#5da9ff}main{height:calc(100vh - 86px);display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;position:relative}.hero{max-width:760px;z-index:2}h1{font-size:3rem}.hero p{margin:22px 0;color:#b7bcc7;line-height:1.8}.status{display:inline-block;padding:10px 18px;border:1px solid rgba(93,169,255,.25);background:rgba(93,169,255,.08);border-radius:8px;color:#9bc7ff}.progress{margin:42px auto 0;max-width:420px;text-align:left}.bar{height:8px;background:#222;border-radius:99px;overflow:hidden}.fill{height:100%;width:68%;background:#5da9ff;animation:pulse 2s infinite}.msg{margin-top:10px;color:#9ea5b5;font-size:.95rem}.counter,.dev{position:fixed;bottom:14px;font-size:.8rem;opacity:.5}.counter{left:18px}.dev{right:18px;opacity:.18}.pixel{position:fixed;width:10px;height:10px;background:#69b4ff;border-radius:2px;box-shadow:0 0 10px #69b4ff;cursor:pointer;animation:fade .3s}.plus{position:fixed;color:#8fd1ff;font-size:.8rem;pointer-events:none;animation:up 1s forwards}.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#171b24;padding:12px 18px;border:1px solid rgba(255,255,255,.08);border-radius:10px;display:none}@keyframes up{to{transform:translateY(-25px);opacity:0}}@keyframes fade{from{opacity:0}to{opacity:1}}@keyframes pulse{50%{filter:brightness(1.3)}}
</style></head><body><header><div class="logo">Dot<span>Pixel</span></div></header><main><div class="hero"><h1>Mini Games.<br>Coming Soon.</h1><p>DotPixel is currently under development. We're building polished browser-based mini games for our college community. Explore the page while we keep building.</p><div class="status">Site Under Construction</div><div class="progress"><div class="bar"><div class="fill"></div></div><div class="msg" id="msg"></div></div></div></main><div class="counter" id="count"></div><div class="dev">Developed by SimpCorp</div><div class="toast" id="toast"></div><script>
const msgs=["Compiling Tiny Pixels...","Optimizing Collision Detection...","Importing Coffee...","Fixing Yesterday's Bugs...","Accidentally Creating New Bugs...","Balancing Difficulty..."];
let c=+localStorage.dp||0;const count=document.getElementById("count"),toast=document.getElementById("toast"),m=document.getElementById("msg");function upd(){count.textContent="Pixels Collected: "+c}upd();let i=0;setInterval(()=>{m.textContent=msgs[i++%msgs.length]},2200);m.textContent=msgs[0];
function spawn(){const p=document.createElement("div");p.className="pixel";p.style.left=Math.random()*(innerWidth-20)+"px";p.style.top=Math.random()*(innerHeight-20)+"px";p.onclick=e=>{c++;localStorage.dp=c;upd();let t=document.createElement("div");t.className="plus";t.style.left=p.style.left;t.style.top=p.style.top;t.textContent="+1 Pixel";document.body.appendChild(t);setTimeout(()=>t.remove(),1000);p.remove();if([25,50,100].includes(c)){toast.style.display="block";toast.textContent="Achievement Unlocked • "+c+" Pixels";setTimeout(()=>toast.style.display="none",2500);}setTimeout(spawn,600)};document.body.appendChild(p);setTimeout(()=>{if(p.isConnected){p.remove();spawn()}},4500)}
for(let k=0;k<4;k++)setTimeout(spawn,k*800);
</script></body></html>
